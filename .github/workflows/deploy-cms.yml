# .github/workflows/deploy-cms.yml

name: Build and Deploy CMS to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - "apps/cms/**"
      - ".github/workflows/deploy-cms.yml"

env:
  # プロジェクトID
  PROJECT_ID: "my-blog-480718"
  REGION: "asia-northeast1"
  # Cloud Runのサービス名
  SERVICE_NAME: "blog-cms"
  # ★Artifact Registryのリポジトリ名を定義
  REPOSITORY: "blog-cms-repo"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write" # Workload Identity連携（キー不要の安全な認証）に必須

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- 認証 ---
      # サービスアカウントキー（JSONファイル）は使いません
      - name: Authenticate to Google Cloud
        id: auth
        uses: "google-github-actions/auth@v2"
        with:
          workload_identity_provider: "projects/860929020350/locations/global/workloadIdentityPools/github-pool/providers/github-provider-752634856723745"
          service_account: "github-actions@my-blog-480718.iam.gserviceaccount.com"
          token_format: "access_token" # ★この1行を追加！

      # --- Dockerビルド & プッシュ ---
      # GitHub ActionsのVM上でDockerコマンドを直接実行します
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: . # モノレポのルートをコンテキストに
          file: ./apps/cms/Dockerfile # Dockerfileの場所を指定
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:latest
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      # --- データベースマイグレーションの実行 ---
      - name: Run database migrations
        run: |
          # マイグレーションジョブを作成して実行
          echo "Creating and executing migration job..."
          set +e  # エラーでも継続
          gcloud run jobs create migrate-cms-${{ github.sha }} \
            --region=${{ env.REGION }} \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --set-secrets=DATABASE_URI=blog-cms-database-uri:latest,PAYLOAD_SECRET=blog-cms-payload-secret:latest \
            --memory=1Gi \
            --cpu=1 \
            --max-retries=0 \
            --task-timeout=10m \
            --execute-now \
            --wait \
            --command=node \
            --args=.next/standalone/apps/cms/node_modules/payload/dist/bin/index.js,migrate

          MIGRATION_EXIT_CODE=$?
          set -e

          # 実行結果の詳細ログを取得（すべて）
          echo "=== Fetching migration logs (stdout) ==="
          gcloud logging read "resource.type=cloud_run_job AND resource.labels.job_name=migrate-cms-${{ github.sha }} AND logName=~stdout" \
            --limit=200 \
            --format="table(timestamp,textPayload)" \
            --freshness=10m \
            || echo "No stdout logs found"

          echo ""
          echo "=== Fetching migration logs (stderr) ==="
          gcloud logging read "resource.type=cloud_run_job AND resource.labels.job_name=migrate-cms-${{ github.sha }} AND logName=~stderr" \
            --limit=200 \
            --format="table(timestamp,textPayload)" \
            --freshness=10m \
            || echo "No stderr logs found"

          # ジョブを削除（クリーンアップ）
          echo ""
          echo "Cleaning up migration job..."
          gcloud run jobs delete migrate-cms-${{ github.sha }} \
            --region=${{ env.REGION }} \
            --quiet \
            || true

          # マイグレーションが失敗していたら終了
          if [ $MIGRATION_EXIT_CODE -ne 0 ]; then
            echo ""
            echo "❌ Migration failed with exit code $MIGRATION_EXIT_CODE"
            exit 1
          fi

          echo ""
          echo "✅ Migration completed successfully"

      # --- Cloud Runへのデプロイ ---
      - name: Deploy to Cloud Run
        id: deploy
        uses: "google-github-actions/deploy-cloudrun@v2"
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          # 直前のステップでプッシュしたイメージを指定
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          flags: >-
            --port=3000
            --allow-unauthenticated
            --set-secrets=DATABASE_URI=blog-cms-database-uri:latest,PAYLOAD_SECRET=blog-cms-payload-secret:latest
            --min-instances=0
            --max-instances=10
            --memory=512Mi
            --cpu=1

      - name: Show deployed URL
        run: echo "Successfully deployed to ${{ steps.deploy.outputs.url }}"
