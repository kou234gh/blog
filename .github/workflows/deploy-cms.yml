# .github/workflows/deploy-cms.yml

name: Build and Deploy CMS to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - "apps/cms/**"
      - ".github/workflows/deploy-cms.yml"

env:
  # プロジェクトID
  PROJECT_ID: "my-blog-480718"
  REGION: "asia-northeast1"
  # Cloud Runのサービス名
  SERVICE_NAME: "blog-cms"
  # ★Artifact Registryのリポジトリ名を定義
  REPOSITORY: "blog-cms-repo"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write" # Workload Identity連携（キー不要の安全な認証）に必須

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- 認証 ---
      # サービスアカウントキー（JSONファイル）は使いません
      - name: Authenticate to Google Cloud
        id: auth
        uses: "google-github-actions/auth@v2"
        with:
          workload_identity_provider: "projects/YOUR_PROJECT_NUMBER/locations/global/workloadIdentityPools/github-pool/providers/github-provider" # ◀ GCPで設定したWIFプロバイダ
          service_account: "github-actions@my-blog-480718.iam.gserviceaccount.com" # ◀ GCPで作成したサービスアカウント

      # --- Dockerビルド & プッシュ ---
      # GitHub ActionsのVM上でDockerコマンドを直接実行します
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: . # モノレポのルートをコンテキストに
          file: ./apps/cms/Dockerfile # Dockerfileの場所を指定
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:latest
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      # --- Cloud Runへのデプロイ ---
      - name: Deploy to Cloud Run
        id: deploy
        uses: "google-github-actions/deploy-cloudrun@v2"
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          # 直前のステップでプッシュしたイメージを指定
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          # ↓↓↓ ここの設定が重要 ↓↓↓
          flags: >-
            --port=3000
            --allow-unauthenticated
            --set-secrets=DATABASE_URI=blog-cms-database-uri:latest,PAYLOAD_SECRET=blog-cms-payload-secret:latest
            --min-instances=0
            --max-instances=10
            --memory=512Mi
            --cpu=1

      - name: Show deployed URL
        run: echo "Successfully deployed to ${{ steps.deploy.outputs.url }}"
