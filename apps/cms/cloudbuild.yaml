steps:
  # Docker イメージをビルド（モノレポのルートから）
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'apps/cms/Dockerfile'
      - '-t'
      - 'gcr.io/$PROJECT_ID/blog-cms:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/blog-cms:latest'
      - '.'

  # イメージをプッシュ（SHA版）
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/blog-cms:$COMMIT_SHA'

  # イメージをプッシュ（latest版）
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/blog-cms:latest'

  # Cloud Run にデプロイ
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'blog-cms'
      - '--image'
      - 'gcr.io/$PROJECT_ID/blog-cms:$COMMIT_SHA'
      - '--platform'
      - 'managed'
      - '--region'
      - 'asia-northeast1'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'NODE_ENV=production'
      - '--set-secrets'
      - 'DATABASE_URI=blog-cms-database-uri:latest,PAYLOAD_SECRET=blog-cms-payload-secret:latest'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--port'
      - '8080'

images:
  - 'gcr.io/$PROJECT_ID/blog-cms:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/blog-cms:latest'

options:
  logging: CLOUD_LOGGING_ONLY
